        - generic [ref=e192]:
          - generic [ref=e193]:
            - heading "What is a token?" [level=2] [ref=e194]
            - paragraph [ref=e195]:
              - text: A
              - strong [ref=e196]: token
              - text: is the smallest unit that a large language model processes. Before a model can read your prompt or generate a response, the text is split into tokens by a component called a tokenizer. Every piece of text you send to GPT, Claude, Gemini, DeepSeek, or any other LLM is first converted into a sequence of integer token IDs — that is what the model actually computes on.
            - paragraph [ref=e197]:
              - text: Modern LLMs use
              - link "Byte-Pair Encoding (BPE)" [ref=e198] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Byte_pair_encoding
              - text: "or SentencePiece tokenizers. These algorithms learn a vocabulary of sub-word pieces from training data: common words like"
              - code [ref=e199]: the
              - text: or
              - code [ref=e200]: and
              - text: become a single token, while rarer words split into multiple tokens —
              - code [ref=e201]: tokenization
              - text: becomes
              - code [ref=e202]: token
              - text: +
              - code [ref=e203]: ization
              - text: . Numbers, punctuation, and non-Latin scripts often consume more tokens per character than plain English.
            - paragraph [ref=e204]:
              - text: "A useful mental model: one token is roughly"
              - strong [ref=e205]: ¾ of an English word
              - text: ", or about"
              - strong [ref=e206]: 4 characters
              - text: . But that average hides a lot of variance — which is exactly why it matters to count, not guess.
