            - paragraph [ref=e260]:
              - text: The context window is the maximum number of tokens a model can attend to in a single call — it includes your system prompt, prior messages, new input,
              - emphasis [ref=e261]: and
              - text: "the generated response. Here are the ceilings for current frontier models (as of 2026-04):"
