            - paragraph [ref=e244]: "A 1,000-word English article is about 1,330 tokens in GPT-4o and about 1,400 in Claude Sonnet — a ~5% difference. On Chinese or Cyrillic text, the gap widens dramatically: some tokenizers are 2–3× more efficient than others on non-Latin scripts."
          - generic [ref=e245]:
            - heading "Why count tokens before sending?" [level=2] [ref=e246]
            - paragraph [ref=e247]: "Every production-grade LLM integration needs a token budget. There are three reasons to count before you send:"
            - generic [ref=e248]:
              - generic [ref=e249]:
                - generic [ref=e250]: Cost estimation
                - paragraph [ref=e251]: API pricing is per token, usually quoted per 1 million tokens input and output separately. A single automated workflow that processes 10,000 support tickets × 4k tokens each is 40M tokens — the difference between GPT-4o and GPT-4o-mini on that workload is thousands of dollars per month.
              - generic [ref=e252]:
                - generic [ref=e253]: Context-window fit
                - paragraph [ref=e254]: "Every model has a hard token ceiling: 128k for GPT-4o, 200k for Claude, 2M for Gemini 2.5 Pro. If your system prompt + chat history + new input exceeds the window, the model rejects the request or silently truncates. Checking before sending prevents mid-pipeline failures."
              - generic [ref=e255]:
                - generic [ref=e256]: Rate-limit planning
                - paragraph [ref=e257]: Providers enforce tokens-per-minute and tokens-per-day limits per account tier. Large batch jobs need to estimate throughput in advance to avoid hitting 429 errors during production runs.
          - generic [ref=e258]:
