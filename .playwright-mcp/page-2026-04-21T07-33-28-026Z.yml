          - generic [ref=e307]:
            - heading "Rules of thumb for estimating" [level=2] [ref=e308]
            - generic [ref=e309]:
              - generic [ref=e310]:
                - generic [ref=e311]: English prose
                - paragraph [ref=e312]: 1 token ≈ 4 characters, or ¾ of a word. 1,000 words ≈ 1,300–1,400 tokens across all modern LLMs.
              - generic [ref=e313]:
                - generic [ref=e314]: Code
                - paragraph [ref=e315]: 15–25% more tokens per character than prose. Minified JSON is the worst case — roughly 1 token per 2.5 chars.
              - generic [ref=e316]:
                - generic [ref=e317]: Non-Latin scripts
                - paragraph [ref=e318]: "Chinese, Japanese, Korean, Arabic, Cyrillic: 2–3× more tokens per character than English in most tokenizers."
              - generic [ref=e319]:
                - generic [ref=e320]: Whitespace
                - paragraph [ref=e321]: Spaces, newlines, and tabs each consume 1 token in most BPE tokenizers. Excessive indentation costs real money at scale.
              - generic [ref=e322]:
                - generic [ref=e323]: Numbers
                - paragraph [ref=e324]: Long numeric sequences often split per 3-digit group. "1,234,567" can be 3–5 tokens depending on the tokenizer.
              - generic [ref=e325]:
                - generic [ref=e326]: Emojis and Unicode
                - paragraph [ref=e327]: Non-ASCII characters frequently tokenize per byte (UTF-8), so a single emoji can consume 2–4 tokens.
